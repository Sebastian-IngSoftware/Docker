services:
  app:
    image: clinet-backend-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${USER_UID}
        GID: ${USER_GID}
    volumes:
      - ./php/php.ini:/usr/local/etc/php/php.ini:ro
      - ./:/var/www/html
